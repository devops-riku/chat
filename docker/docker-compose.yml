name: messagingapp

services:
  # Optional reverse proxy — enable with: docker compose --profile proxy up
  # On Windows, if Traefik can't reach Docker, run WITHOUT the proxy profile.
  traefik:
    profiles: [proxy]
    image: traefik:latest
    command:
      - --configFile=/etc/traefik/traefik.yml
    ports:
      - "80:80"
      - "8080:8080"
    volumes:
      - type: npipe
        source: \\.\pipe\docker_engine
        target: \\.\pipe\docker_engine
      - ../infrastructure/traefik/traefik.yml:/etc/traefik/traefik.yml:ro
    networks:
      - nexus

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-nexus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nexus_secret}
      POSTGRES_DB: ${POSTGRES_DB:-nexus_chat}
      PGDATABASE: ${POSTGRES_DB:-nexus_chat}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nexus} -d ${POSTGRES_DB:-nexus_chat}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - nexus

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - nexus

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-nexus_minio}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-nexus_minio_secret}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - nexus

  coturn:
    image: coturn/coturn:latest
    volumes:
      - ../infrastructure/coturn/turnserver.conf:/etc/coturn/turnserver.conf:ro
    ports:
      - "3478:3478/udp"
      - "3478:3478/tcp"
      - "5349:5349/tcp"
      - "49152-49200:49152-49200/udp"
    networks:
      - nexus

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-nexus}:${POSTGRES_PASSWORD:-nexus_secret}@postgres:5432/${POSTGRES_DB:-nexus_chat}
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      BACKEND_PUBLIC_URL: ${BACKEND_PUBLIC_URL:-http://localhost:8000}
      DEBUG: "false"
      CORS_ORIGINS: http://localhost:3000,http://127.0.0.1:3000,http://app.localhost
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    labels:
      - traefik.enable=true
      - traefik.http.routers.api.rule=Host(`${API_HOST:-api.localhost}`)
      - traefik.http.routers.api.entrypoints=web
      - traefik.http.services.api.loadbalancer.server.port=8000
    networks:
      - nexus

  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
        NEXT_PUBLIC_SOCKET_URL: ${NEXT_PUBLIC_SOCKET_URL:-http://localhost:8000}
        NEXT_PUBLIC_TURN_URL: turn:${DOMAIN:-localhost}:3478
        NEXT_PUBLIC_TURN_USERNAME: ${TURN_USER:-nexus}
        NEXT_PUBLIC_TURN_CREDENTIAL: ${TURN_PASSWORD:-nexus_turn_secret}
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      - backend
    labels:
      - traefik.enable=true
      - traefik.http.routers.app.rule=Host(`${APP_HOST:-app.localhost}`)
      - traefik.http.routers.app.entrypoints=web
      - traefik.http.services.app.loadbalancer.server.port=3000
    networks:
      - nexus

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  nexus:
    driver: bridge
    name: nexus
